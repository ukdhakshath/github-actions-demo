name: Environment Demo

on:
  push:

env:
  PROJECT_NAME: GitHub Actions Demo
  AUTHOR: Dhakshath

jobs:
  env-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Print Project Name
        run: echo $PROJECT_NAME

      - name: Print Author
        run: echo $AUTHOR

      - name: Print Both
        run: |
          echo "Project: $PROJECT_NAME"
          echo "Author: $AUTHOR"