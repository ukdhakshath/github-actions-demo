name: Matrix Demo

on:
  push:

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18,20,22]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show Node Version
        run: node -v

      - name: Install Packages
        run: npm install

      - name: Run Tests
        run: npm test